name: Update Data Pipeline & Deploy to HF Space

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Ensure the action has permission to push commits back to the repo
permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy joblib scikit-learn lightgbm

      - name: Run Data Update & Matrix Generation
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/update_and_generate.py

      - name: Commit Updated Raw Data Back to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/player_match_metrics_wc_auto.csv
          
          # Only commit if the raw CSV was actually modified
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: Appended latest WC match data"
            git push origin main
            echo "✅ Raw data saved to repository."
          else
            echo "No changes to raw data to commit."
          fi

      - name: Clone Hugging Face Space
        run: |
          git clone https://huggingface.co/spaces/GaryC246/soccer-app hf_space

      - name: Copy updated Matrices to Space
        run: |
          mkdir -p hf_space/data
          # Only copy if the matrix file exists (in case the pipeline skipped generation)
          if [ -f data/hybrid_matrices.csv ]; then
            cp data/hybrid_matrices.csv hf_space/data/hybrid_matrices.csv
          fi

      - name: Commit and Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd hf_space
          git config user.name "GitHub Actions CI"
          git config user.email "ci@github.com"
          git add data/hybrid_matrices.csv
          
          # Only commit if the matrices actually changed
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: Regenerated hybrid matrices with new WC data"
            git push https://GaryC246:$HF_TOKEN@huggingface.co/spaces/GaryC246/soccer-app main
            echo "Successfully pushed updated matrices to Hugging Face Space!"
          else
            echo "No new matrix data to push to Hugging Face."
          fi